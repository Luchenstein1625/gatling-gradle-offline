# docker-compose.local.yml
# Configuración LOCAL SOLAMENTE - Simula el ambiente de servidor con límites de recursos
# NO commitear este archivo (está en .gitignore)
#
# USO:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up
#
# O configurar como default en .env:
#   COMPOSE_FILE=docker-compose.yml:docker-compose.local.yml

version: '3.8'

services:
  gatling-api:
    # Límites de memoria para simular servidor con recursos limitados
    # En servidor: los límites vienen de orquestador (Kubernetes, nomad, etc)
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 384M
