name: BCI Login Smoke Test
simulationClass: bci.cards.simulation.PublicMockSimulation
mode: login
description: Prueba de validación de autenticación OAuth para 5 RUTs BCI

environment:
  BCI_LOGIN_URL: "https://bci-api-crt001.internal.bci.cl/operaciones/seguridad-y-acceso/ms-loginclientes-util/v1.3/oauth/token"
  BCI_LOGIN_BASIC_AUTH: "YXBwLW1vdmlsLXBlcnNvbmFzOnNlY3JldGlzaW1v"
  BCI_LOGIN_APPLICATION_ID: "asd"
  BCI_LOGIN_CHANNEL: "910"
  BCI_LOGIN_REFERENCE_SERVICE: "sad"
  BCI_LOGIN_REFERENCE_OPERATION: "111"
  BCI_LOGIN_ORIGIN_ADDR: "111"
  BCI_LOGIN_COOKIE: "_cfuvid=NNYC.3ZNbRjmgnd9QKyxyuqKgbYVlKjGfqjl71bWJSk-1728303064117-0.0.1.1-604800000"

injection:
  type: "atOnceUsers"
  users: 5
  duration: "1 minute"

sla:
  maxResponseTime: 3000
  failedRequests: 0

assertions:
  global:
    - type: "status"
      value: 200
    - type: "failedRequests"
      value: 0
    - type: "responseTime"
      metric: "max"
      value: 3000
