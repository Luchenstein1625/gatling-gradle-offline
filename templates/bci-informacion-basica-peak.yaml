name: BCI Información Básica - Peak Test (Mini)
simulationClass: bci.cards.simulation.BcimsInformacionBasicaPeakSimulation
mode: peak
description: "Prueba pequeña Peak: 30s, máx 3 usuarios concurrentes para validar"

environment:
  BCI_LOGIN_URL: "https://bci-api-crt001.internal.bci.cl/operaciones/seguridad-y-acceso/ms-loginclientes-util/v1.3/oauth/token"
  BCI_LOGIN_BASIC_AUTH: "YXBwLW1vdmlsLXBlcnNvbmFzOnNlY3JldGlzaW1v"
  BCI_API_BASE_URL: "http://bci-api-crt004.bci.cl"
  BCI_LOGIN_APPLICATION_ID: "Pruebas Pequeñas"
  BCI_LOGIN_CHANNEL: "910"
  BCI_LOGIN_REFERENCE_SERVICE: "Pruebas Pequeñas"
  BCI_LOGIN_REFERENCE_OPERATION: "111"
  BCI_LOGIN_ORIGIN_ADDR: "111"
  BCI_LOGIN_COOKIE: "_cfuvid=test"
  BCI_API_APPLICATION_ID: "postman"
  BCI_API_CHANNEL: "910"
  BCI_API_REFERENCE_SERVICE: "postman"
  BCI_API_REFERENCE_OPERATION: "postman"
  BCI_API_ORIGIN_ADDR: "127.0.0.1"

injection:
  type: "rampUsers"
  users: 3
  duration: "10 seconds"

sla:
  maxResponseTime: 5000
  failedRequests: 0

assertions:
  global:
    - type: "status"
      value: 200
    - type: "failedRequests"
      value: 0
    - type: "responseTime"
      metric: "max"
      value: 5000
