apiVersion: v1
kind: ServiceAccount
metadata:
  name: gatling-control-api
  namespace: bci-api
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gatling-control-api-pod-log-reader
  namespace: bci-api
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gatling-control-api-pod-log-reader
  namespace: bci-api
subjects:
  - kind: ServiceAccount
    name: gatling-control-api
    namespace: bci-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gatling-control-api-pod-log-reader
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatling-control-api
  namespace: bci-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gatling-control-api
  template:
    metadata:
      labels:
        app: gatling-control-api
    spec:
      serviceAccountName: gatling-control-api
      containers:
        - name: api
          image: REGISTRO_INTERNO/gatling-control-api:1.0.0
          ports:
            - containerPort: 8080
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

            # Ejemplo: completar con Secrets/ConfigMaps corporativos.
            - name: BCI_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gatling-api-secrets
                  key: api-token
                  optional: true

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "768Mi"

          volumeMounts:
            - name: data
              mountPath: /app/data

      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: gatling-control-api
  namespace: bci-api
spec:
  selector:
    app: gatling-control-api
  ports:
    - port: 8080
      targetPort: 8080
