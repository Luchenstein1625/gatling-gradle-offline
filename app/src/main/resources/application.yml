server:
  port: 8080
  servlet:
    context-path: ${API_PREFIX:/gatling/gatling-gen3-app/v0.1}

# CHANGESET-APP-CONFIG-2026-07-20:
# Subir este archivo para exponer management health en /health (sin /actuator).

spring:
  application:
    name: gatling-gen3-app
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  config:
    import: "optional:vault://"

  cloud:
    vault:
      enabled: ${VAULT_ENABLED:true}
      scheme: ${VAULT_SCHEME:https}
      host: ${VAULT_HOST:vault-server-service.bci-infra}
      port: ${VAULT_PORT:8200}
      authentication: ${VAULT_AUTHENTICATION:APPROLE}
      app-role:
        role-id: ${VAULT_ROLE_ID}
        secret-id: ${VAULT_SECRET_ID}
      ssl:
        trust-store: ${VAULT_TRUST_STORE:}
        trust-store-password: ${VAULT_TRUST_STORE_PWD:}
      fail-fast: ${VAULT_FAIL_FAST:true}
      application-name: token_pruebas

  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 1MB

performance:
  simulations-dir: ${PERFORMANCE_SIMULATIONS_DIR:/app/data/simulations}
  executions-dir: ${RESULTS_DIR:/app/data/executions}
  gatling-command: ${GATLING_COMMAND:/opt/gradle/gradle-8.6/bin/gradle}
  gatling-project-dir: ${GATLING_PROJECT_DIR:/app/gatling-runner}

security:
  scan:
    gradle-command: ${SECURITY_GRADLE_COMMAND:/opt/gradle/gradle-8.6/bin/gradle}
    project-dir: ${SECURITY_PROJECT_DIR:/app/security-runner}
    report-dir: ${SECURITY_REPORT_DIR:/app/data/security/reports}
    trivy-command: ${TRIVY_COMMAND:/usr/local/bin/trivy}

# Endpoint de health check expuesto en /health
management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: "health,info"
  endpoint:
    health:
      show-details: always
