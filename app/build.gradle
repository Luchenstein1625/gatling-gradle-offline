buildscript {
    repositories {
        mavenCentral()
    }
    dependencies {
        classpath 'org.springframework.boot:spring-boot-gradle-plugin:3.5.16'
        classpath 'io.spring.gradle:dependency-management-plugin:1.1.7'
    }
}

apply plugin: 'java'
apply plugin: 'org.springframework.boot'
apply plugin: 'io.spring.dependency-management'

// CHANGESET-BUILD-GRADLE-2026-07-20:
// Subir este archivo para generar app-version.properties con version/timestamp de build.

group = 'cl.bci'
version = '0.0.1-SNAPSHOT'

sourceCompatibility = JavaVersion.VERSION_17
targetCompatibility = JavaVersion.VERSION_17

repositories {
    mavenCentral()
}

ext {
    // Línea corporativa validada para la integración Vault. No cambiar de forma
    // independiente: Boot, Cloud y Vault deben actualizarse como una matriz compatible.
    set('springCloudVersion', "2025.0.3")
    // Correcciones puntuales de seguridad. No modifican el BOM de Spring Cloud
    // ni la versión de Vault administrada por ese BOM.
    set('tomcatVersion', "10.1.57")
    set('jacksonDatabindVersion', "2.21.5")
    set('httpCore5Version', "5.4.3")
}

configurations.configureEach {
    resolutionStrategy {
        force "org.apache.tomcat.embed:tomcat-embed-core:${tomcatVersion}"
        force "org.apache.tomcat.embed:tomcat-embed-el:${tomcatVersion}"
        force "org.apache.tomcat.embed:tomcat-embed-websocket:${tomcatVersion}"
        force "com.fasterxml.jackson.core:jackson-databind:${jacksonDatabindVersion}"
        force "org.apache.httpcomponents.core5:httpcore5:${httpCore5Version}"
        force "org.apache.httpcomponents.core5:httpcore5-h2:${httpCore5Version}"
    }
}

dependencies {
    // Web & Actuator
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-thymeleaf'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'

    // Thymeleaf actualizado explícitamente por los hallazgos críticos del reporte.
    implementation 'org.thymeleaf:thymeleaf:3.1.5.RELEASE'
    implementation 'org.thymeleaf:thymeleaf-spring6:3.1.5.RELEASE'

    // Spring Cloud & Vault Integration. La versión de Vault la administra el BOM
    // Spring Cloud 2025.0.3; no declarar otra spring-vault-core en paralelo.
    implementation 'org.springframework.cloud:spring-cloud-starter-vault-config'

    // Lombok
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    // Test
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

dependencyManagement {
    imports {
        mavenBom "org.springframework.cloud:spring-cloud-dependencies:${springCloudVersion}"
    }

    // Sobrescrituras puntuales posteriores a los BOM de Spring. Declararlas aquí
    // evita que el BOM de Spring Boot vuelva a seleccionar las versiones
    // vulnerables durante la resolución del runtimeClasspath.
    dependencies {
        dependency "org.apache.tomcat.embed:tomcat-embed-core:${tomcatVersion}"
        dependency "org.apache.tomcat.embed:tomcat-embed-el:${tomcatVersion}"
        dependency "org.apache.tomcat.embed:tomcat-embed-websocket:${tomcatVersion}"
        dependency "com.fasterxml.jackson.core:jackson-databind:${jacksonDatabindVersion}"
        dependency "org.apache.httpcomponents.core5:httpcore5:${httpCore5Version}"
        dependency "org.apache.httpcomponents.core5:httpcore5-h2:${httpCore5Version}"
    }
}

bootJar {
    archiveFileName = 'app.jar'
    mainClass = 'cl.bci.vaultchecker.VaultCheckerApplication'
}

test {
    useJUnitPlatform()
}

tasks.register('verifySecurityDependencyVersions') {
    doLast {
        def expected = [
                'org.apache.tomcat.embed:tomcat-embed-core': tomcatVersion,
                'com.fasterxml.jackson.core:jackson-databind': jacksonDatabindVersion,
                'org.apache.httpcomponents.core5:httpcore5': httpCore5Version,
                'org.springframework.cloud:spring-cloud-starter-vault-config': null
        ]
        def resolved = configurations.runtimeClasspath.resolvedConfiguration.resolvedArtifacts
        expected.each { coordinate, version ->
            def parts = coordinate.split(':')
            def artifact = resolved.find {
                it.moduleVersion.id.group == parts[0] && it.name == parts[1]
            }
            if (artifact == null) {
                throw new GradleException("No se resolvió la dependencia requerida: ${coordinate}")
            }
            if (version != null && artifact.moduleVersion.id.version != version) {
                throw new GradleException("${coordinate} resolvió ${artifact.moduleVersion.id.version}; se esperaba ${version}")
            }
            logger.lifecycle("VERIFIED ${coordinate}:${artifact.moduleVersion.id.version}")
        }
    }
}

tasks.named('bootJar') {
    dependsOn tasks.named('verifySecurityDependencyVersions')
}

sourceSets {
    main {
        resources {
            srcDirs = ['src/main/resources']
        }
    }
}

def generatedVersionDir = file("$buildDir/generated-resources")
def generatedVersionFile = file("$generatedVersionDir/app-version.properties")

tasks.register('generateAppVersionProperties') {
    outputs.file generatedVersionFile
    doLast {
        generatedVersionDir.mkdirs()
        def buildTimestamp = new Date().format('yyyy-MM-dd HH:mm:ss Z')
        generatedVersionFile.text = """app.build.version=${project.version}
app.build.timestamp=${buildTimestamp}
app.build.display=${project.version} @ ${buildTimestamp}
"""
    }
}

processResources.dependsOn tasks.named('generateAppVersionProperties')
sourceSets.main.resources.srcDir(generatedVersionDir)
