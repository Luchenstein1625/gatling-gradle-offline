apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    AppId: na
    affectedChannel: omnicanal
    app: gatling-gen3-app
    app.kubernetes.io/cost-allocation: omnicanal
    app.kubernetes.io/imgbase: eclipse-temurin-java21
    app.kubernetes.io/name: gatling-gen3
    app.kubernetes.io/part-of: tarjetacredito
    app.kubernetes.io/version: re-v1-0-0
    owner: luis-araya
    product: tarjetacredito
    tier: backend
    tierApp: ms
    type: service
  name: gatling-gen3-re-v1-0
  namespace: bci-api
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: gatling-gen3-app
  strategy:
    rollingUpdate:
      maxSurge: 50%
      maxUnavailable: 30%
    type: RollingUpdate
  template:
    metadata:
      labels:
        AppId: na
        affectedChannel: omnicanal
        app: gatling-gen3-app
        app.kubernetes.io/cost-allocation: omnicanal
        app.kubernetes.io/imgbase: eclipse-temurin-java21
        app.kubernetes.io/name: gatling-gen3
        app.kubernetes.io/part-of: tarjetacredito
        app.kubernetes.io/version: re-v1-0-0
        product: tarjetacredito
        tier: backend
        tierApp: ms
        type: service
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - gatling-gen3-app
            topologyKey: kubernetes.io/hostname
      containers:
      - env:
        - name: DT_RELEASE_VERSION
          value: re-v1-0-0
        - name: DT_RELEASE_STAGE
          value: CRT
        - name: DT_RELEASE_PRODUCT
          value: tarjetacredito
        - name: PORT
          value: "8080"
        # Spring Boot / Gatling Configuration
        - name: APP_DATA_ROOT
          value: "/app/data"
        - name: RESULTS_DIR
          value: "/app/data/executions"
        - name: API_PREFIX
          value: "/gatling/gatling-gen3-app/v0.1"
        - name: GATLING_CLASSPATH
          value: "/opt/gatling/classes:/opt/gatling/lib/*"
        # JVM tuning para ambiente con memoria limitada
        - name: JAVA_TOOL_OPTIONS
          value: "-XX:+UseG1GC -Xms32m -Xmx160m -XX:MaxMetaspaceSize=128m"
        # Vault (alineado a requerimientos confirmados)
        - name: VAULT_SCHEME
          value: https
        - name: VAULT_HOST
          value: vault-server-service.bci-infra
        - name: VAULT_PORT
          value: "8200"
        - name: VAULT_ROLE_ID
          valueFrom:
            secretKeyRef:
              key: VAULT_ROLE_ID
              name: vault-role-secret-id
        - name: VAULT_SECRET_ID
          valueFrom:
            secretKeyRef:
              key: VAULT_SECRET_ID
              name: vault-role-secret-id
        - name: VAULT_AUTHENTICATION
          value: APPROLE
        - name: VAULT_SECRET_PATH
          value: "secret/token_pruebas/qa" 
        - name: VAULT_TRUST_STORE
          value: file:/vol-ms/pubcerts.ts                   
        - name: TZ
          valueFrom:
            configMapKeyRef:
              key: TZ
              name: env-data
        envFrom:
        - configMapRef:
            name: env-global
        # 🔐 Secure image with Spring Boot 3.5.16 BOM, zero CVEs
        # Built: 2026-07-17, Gatling 3.15.1, Jackson 2.21.3, Netty 4.2.14
        image: bcirg3crtrgandes01acr001.azurecr.io/gatling/gatling-gen3-docker-fast-api:secure
        imagePullPolicy: IfNotPresent  # Changed from Always to reduce image pulls
        name: gatling-gen3-re-v1-0
        ports:
        - containerPort: 8080
          protocol: TCP
        # Kubernetes health checks (aligned with Dockerfile health-check)
        livenessProbe:
          httpGet:
            path: /gatling/gatling-gen3-app/v0.1/actuator/health/liveness
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 30  # Increased from 20 to allow Spring Boot startup
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /gatling/gatling-gen3-app/v0.1/actuator/health/readiness
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 20  # Increased from 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 2
        # Resource limits for Spring Boot + Gatling (CONFIRMED via testing)
        # Xms32m, Xmx160m JVM settings ensure memory efficiency
        resources:
          limits:
            cpu: "1"
            memory: 768Mi  # Fixed unit to Mi (not M)
          requests:
            cpu: 100m  # Increased from 10m for stable startup
            memory: 384Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /vol-ms
          name: ms-secret-vol
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      # Security context: non-root user (gatling:1001) from Dockerfile
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      volumes:
      - name: ms-secret-vol
        secret:
          defaultMode: 420
          secretName: ms-secret