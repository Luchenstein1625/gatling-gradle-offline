name: bcims-informacion-basica-peak
profile: PEAK

authentication:
  mode: LOGIN
  loginUrl: ${BCI_LOGIN_URL}
  basicAuth: ${BCI_LOGIN_BASIC_AUTH}
  applicationId: ${BCI_LOGIN_APPLICATION_ID}
  channel: ${BCI_LOGIN_CHANNEL}
  referenceService: ${BCI_LOGIN_REFERENCE_SERVICE}
  referenceOperation: ${BCI_LOGIN_REFERENCE_OPERATION}
  originAddr: ${BCI_LOGIN_ORIGIN_ADDR}
  cookie: ${BCI_LOGIN_COOKIE}
  xIbmClientId: ${BCI_LOGIN_X_IBM_CLIENT_ID}
  clientId: ${BCI_LOGIN_CLIENT_ID}

target:
  baseUrl: ${BCI_API_BASE_URL}
  applicationId: ${BCI_API_APPLICATION_ID}
  channel: ${BCI_API_CHANNEL}
  referenceService: ${BCI_API_REFERENCE_SERVICE}
  referenceOperation: ${BCI_API_REFERENCE_OPERATION}
  originAddr: ${BCI_API_ORIGIN_ADDR}

scenarios:
  tarjetas:
    users: 75
    rampSeconds: 90
  saldos:
    users: 150
    rampSeconds: 90
  deuda:
    users: 90
    rampSeconds: 90

maxDurationSeconds: 840

throttle:
  - action: reach
    rps: 150
    seconds: 90
  - action: hold
    seconds: 180
  - action: reach
    rps: 278
    seconds: 30
  - action: hold
    seconds: 60
  - action: reach
    rps: 214
    seconds: 30
  - action: hold
    seconds: 180
  - action: reach
    rps: 322
    seconds: 20
  - action: hold
    seconds: 40
  - action: reach
    rps: 214
    seconds: 20
  - action: hold
    seconds: 120
  - action: reach
    rps: 3
    seconds: 40

assertions:
  maxFailedPercentage: 1.0
  percentile: 95
  maxResponseTimeMilliseconds: 3000
