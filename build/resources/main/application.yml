server:
  port: ${PORT:8080}
  servlet:
    context-path: ${API_PREFIX:/gatling/gatling-gen3-app/v0.1}
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

spring:
  application:
    name: gatling-control-api
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  cloud:
    compatibility-verifier:
      enabled: false                         # Spring Boot 3.5.16 con Spring Cloud 2024.0.0 (CVE fix prioridad)
    vault:
      enabled: ${VAULT_ENABLED:false}        # Solo activa en Kubernetes con VAULT_ENABLED=true
      scheme: ${VAULT_SCHEME:https}
      host: ${VAULT_HOST:localhost}
      port: ${VAULT_PORT:8200}
      authentication: ${VAULT_AUTHENTICATION:APPROLE}
      app-role:
        role-id: ${VAULT_ROLE_ID:}
        secret-id: ${VAULT_SECRET_ID:}
      ssl:
        trust-store: ${VAULT_TRUST_STORE:}
        trust-store-password: ${VAULT_TRUST_STORE_PWD:}
      fail-fast: false                       # No crashear si Vault no está disponible
      application-name: token_pruebas

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true       # Habilita /actuator/health/liveness y /actuator/health/readiness
      show-details: never   # No exponer detalles internos en producción
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

springdoc:
  swagger-ui:
    path: /docs
    operations-sorter: method
  api-docs:
    path: /openapi

app:
  data-root: ${APP_DATA_ROOT:/app/data}
  runner:
    java-command: ${RUNNER_JAVA_COMMAND:java}
    classpath: ${GATLING_CLASSPATH:/opt/gatling/classes:/opt/gatling/lib/*}
