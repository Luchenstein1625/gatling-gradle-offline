services:
  gatling-api:
    # CHANGESET-COMPOSE-2026-07-20:
    # Subir este archivo para usar healthcheck en /health.
    build:
      context: .
      # En el primer build descarga y guarda en la imagen Gatling, Scala y sus dependencias Gradle.
      dockerfile: Dockerfile
    container_name: gatling-control-api
    ports:
      - "8080:8080"
    environment:
      APP_DATA_ROOT: /app/data
      RESULTS_DIR: /app/data/executions
      API_PREFIX: /gatling/gatling-gen3-app/v0.1
      JAVA_TOOL_OPTIONS: "-XX:+UseG1GC -Xms32m -Xmx384m -XX:MaxMetaspaceSize=192m"
      # Permite levantar en local sin Vault, pero habilitable por variable al probar conectividad real.
      SPRING_CLOUD_VAULT_ENABLED: "${SPRING_CLOUD_VAULT_ENABLED:-false}"
      SPRING_CLOUD_CONFIG_ENABLED: "${SPRING_CLOUD_CONFIG_ENABLED:-false}"
      SPRING_CLOUD_VAULT_SCHEME: "${VAULT_SCHEME:-https}"
      SPRING_CLOUD_VAULT_HOST: "${VAULT_HOST:-vault-server-service.bci-infra}"
      SPRING_CLOUD_VAULT_PORT: "${VAULT_PORT:-8200}"
      SPRING_CLOUD_VAULT_AUTHENTICATION: "${VAULT_AUTHENTICATION:-APPROLE}"
      SPRING_CLOUD_VAULT_APP_ROLE_ROLE_ID: "${VAULT_ROLE_ID:-local-role-id}"
      SPRING_CLOUD_VAULT_APP_ROLE_SECRET_ID: "${VAULT_SECRET_ID:-local-secret-id}"
      SPRING_CLOUD_VAULT_FAIL_FAST: "${VAULT_FAIL_FAST:-false}"
      SPRING_CLOUD_VAULT_SSL_TRUST_STORE: "${VAULT_TRUST_STORE:-}"
      SPRING_CLOUD_VAULT_SSL_TRUST_STORE_PASSWORD: "${VAULT_TRUST_STORE_PWD:-}"
      # ===== VAULT INJECTION OVERRIDES =====
      VAULT_ENABLED: "${VAULT_ENABLED:-false}"
      VAULT_FAIL_FAST: "${VAULT_FAIL_FAST:-false}"
      VAULT_SCHEME: "${VAULT_SCHEME:-https}"
      VAULT_HOST: "${VAULT_HOST:-vault-server-service.bci-infra}"
      VAULT_PORT: "${VAULT_PORT:-8200}"
      VAULT_AUTHENTICATION: "${VAULT_AUTHENTICATION:-APPROLE}"
      VAULT_ROLE_ID: "${VAULT_ROLE_ID:-local-role-id}"
      VAULT_SECRET_ID: "${VAULT_SECRET_ID:-local-secret-id}"
      VAULT_TOKEN: "${VAULT_TOKEN:-}"
      VAULT_SECRET_KEY_NAME: "${VAULT_SECRET_KEY_NAME:-BCI_LOGIN_BASIC_AUTH}"
      VAULT_TRUST_STORE: "${VAULT_TRUST_STORE:-}"
      VAULT_TRUST_STORE_PWD: "${VAULT_TRUST_STORE_PWD:-}"
      PERFORMANCE_SIMULATIONS_DIR: /app/data/simulations
      GATLING_COMMAND: "${GATLING_COMMAND:-/opt/gradle/gradle-8.14.3/bin/gradle}"
      GATLING_PROJECT_DIR: /app/gatling-runner
      SECURITY_PROJECT_DIR: /app/security-runner
      SECURITY_GRADLE_COMMAND: /opt/gradle/gradle-8.14.3/bin/gradle
      SECURITY_SCAN_TARGET: /app/app.jar
      SECURITY_REPORT_DIR: /app/data/security/reports
      SECURITY_DATA_DIR: /app/data/security/database
      TRIVY_COMMAND: /usr/local/bin/trivy
      TRIVY_CACHE_DIR: /app/data/security/trivy-cache
      # Opcional pero recomendado para evitar límites de velocidad de NVD.
      NVD_API_KEY: "${NVD_API_KEY:-}"
      
      # BCI Config Pass-throughs
      BCI_LOGIN_URL: ${BCI_LOGIN_URL:-}
      BCI_LOGIN_BASIC_AUTH: ${BCI_LOGIN_BASIC_AUTH:-LOCAL_MOCK_ONLY}
      BCI_LOGIN_APPLICATION_ID: ${BCI_LOGIN_APPLICATION_ID:-Pruebas de Rendimiento Andes Cert}
      BCI_LOGIN_CHANNEL: ${BCI_LOGIN_CHANNEL:-910}
      BCI_LOGIN_REFERENCE_SERVICE: ${BCI_LOGIN_REFERENCE_SERVICE:-Pruebas de Rendimiento Andes Cert}
      BCI_LOGIN_REFERENCE_OPERATION: ${BCI_LOGIN_REFERENCE_OPERATION:-111}
      BCI_LOGIN_ORIGIN_ADDR: ${BCI_LOGIN_ORIGIN_ADDR:-111}
      BCI_LOGIN_COOKIE: ${BCI_LOGIN_COOKIE:-}
      BCI_LOGIN_X_IBM_CLIENT_ID: ${BCI_LOGIN_X_IBM_CLIENT_ID:-}
      BCI_LOGIN_CLIENT_ID: ${BCI_LOGIN_CLIENT_ID:-}
      BCI_API_BASE_URL: ${BCI_API_BASE_URL:-}
      BCI_API_APPLICATION_ID: ${BCI_API_APPLICATION_ID:-postman}
      BCI_API_CHANNEL: ${BCI_API_CHANNEL:-910}
      BCI_API_REFERENCE_SERVICE: ${BCI_API_REFERENCE_SERVICE:-postman}
      BCI_API_REFERENCE_OPERATION: ${BCI_API_REFERENCE_OPERATION:-postman}
      BCI_API_ORIGIN_ADDR: ${BCI_API_ORIGIN_ADDR:-127.0.0.1}
      BCI_API_TOKEN: ${BCI_API_TOKEN:-}
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      # La imagen Temurin no incluye curl. Esta comprobación funciona sin instalar
      # paquetes ni acceder a Internet durante el build offline.
      test: ["CMD", "bash", "-c", ": </dev/tcp/127.0.0.1/8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s
    networks:
      - gatling-network

networks:
  gatling-network:
    driver: bridge
